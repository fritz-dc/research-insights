    # NB01 and NB03 setup should read this list and pass it to quality_report()
    # as the stopwords argument. Until that wiring is in place, quality_report()
    # falls back to the HARD_STOPWORDS constant in utils.py — keep the two in sync.
    # Extend this list if new high-frequency noise terms appear in quality reports.
