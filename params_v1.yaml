# ──────────────────────────────────────────────────────────────────────────────
# Trend Tracker — params.yaml  (pipeline v1.0.0)
#
# Single source of truth for all tunable pipeline values.
# Do not hardcode parameter values in notebook cells or utils.py.
#
# Block → primary notebook consumer
#   sql, preprocess, ingest        →  01_token_preprocess
#   ngrams, tfidf                  →  01_token_preprocess, 03_insights_generation
#   nmf                            →  03_insights_generation
#   enrichment                     →  02_semantic_enrichment
#   analysis                       →  03_insights_generation
#   llm, models                    →  02_semantic_enrichment, 03_insights_generation
#   output                         →  03_insights_generation
#   quality                        →  01_token_preprocess, 03_insights_generation
#
# Per-run overrides: set env var TREND_TRACKER_PARAMS to the path of an
# alternate YAML file before launching Jupyter. load_cfg() already checks
# this variable, so the override is live with no code changes required.
# ──────────────────────────────────────────────────────────────────────────────

sql:
  min_doc_count: 15          # Minimum number of distinct projects a token must appear in to be retained after SQL-side filtering.
  max_doc_fraction: 0.50     # Maximum share of projects a token may appear in before being treated as too common and dropped.
  token_cap: 80              # Maximum number of tokens kept per project after SQL extraction / trimming.

preprocess:
  min_project_tokens: 5           # Minimum number of tokens a project must have after preprocessing to remain in the dataset.
  dedup_tokens_per_project: true  # Whether repeated occurrences of the same token inside a single project are collapsed to one unique token.
  known_lemma_fixes_path: "CONFIG/known_lemma_fixes.yaml"  # Path to the simplemma truncation-artifact correction dictionary. NB01 setup should load this file and pass the resulting dict to build_consolidation_candidates().

ingest:
  chunk_size: 500000         # Number of rows to process per chunk when ingesting large SQL extract CSVs.

ngrams:
  max_n: 3                   # Maximum n-gram length to generate upstream (for example: 3 = allow unigrams, bigrams, and trigrams).

tfidf:
  min_df: 8                  # Minimum document frequency threshold for terms retained in TF-IDF.
  max_df: 0.45               # Maximum document-frequency share allowed before a term is considered too common.
  ngram_range: [1, 2]        # Range of n-grams used for TF-IDF feature construction.

nmf:
  n_components: 20           # Base number of NMF topics/components per group.
  top_words: 12              # Number of highest-weight terms surfaced per topic.
  random_seed: 42            # Random seed for reproducible NMF initialization.
  max_iter: 400              # Maximum number of iterations for NMF optimization.

enrichment:
  rare_doc_freq_ceiling: 1000        # Maximum document frequency for a token/phrase to count as "rare" during Pass A candidate discovery (02_semantic_enrichment).
  agg_distance_threshold: 0.35       # Cosine-distance threshold for agglomerative clustering of enrichment candidates; lower values create tighter clusters.
  min_cluster_size: 3                # Minimum number of terms required for an enrichment cluster to be kept after clustering.
  min_inject_projects: 25            # Minimum number of projects that must contain a term mapping to an injected token for that token to be injected. NB02 Pass C should read this value and apply it as a filter before writing the enriched parquet.
  max_doc_freq_for_injection: 25000  # Maximum document frequency allowed for a candidate enrichment term before it is considered too common to inject. NB02 Pass C should load ceiling_exceptions_path and exempt listed terms from this ceiling.
  ceiling_exceptions_path: "CONFIG/ceiling_exceptions.yaml"  # Path to the per-term injection-ceiling override map. NB02 Pass C should load this file and use it to exempt listed terms from max_doc_freq_for_injection.
  classify_batch_size: 150           # Number of terms sent per batch during LLM framing classification (Pass B).
  embedding_model: "all-MiniLM-L6-v2"  # SentenceTransformer model used to create embeddings for Pass A clustering. Must be available in the local model cache.
  cache_schema_version: "v1"           # Manual cache-busting version string for Pass A embeddings. Increment to force re-embedding even when input terms have not changed.
  coverage_deviation_warn_threshold: 10  # Warning threshold in percentage points; intended to trigger append_warning() in 02_semantic_enrichment when realized injection coverage deviates from the taxonomy target by more than this amount.
  force_reclassify: true                # When true, re-run Pass B framing classification even if a cached framing_map.csv with a matching taxonomy hash already exists.

analysis:
  group_by: project_category   # Column used to split the corpus into analysis groups. Downstream code expects a scalar field name.
  min_group_projects: 20        # Minimum number of projects required for a group to be included in analysis.
  min_coverage: 4               # Minimum number of groups a cross-group theme must appear in to be retained.
  topic_assignment_threshold: 0.30  # Minimum topic_share required to link a project to a topic in the project-topic bridge table.
  nmf_min_shared: 3             # Minimum number of shared top terms required to count two topics as overlapping for cross-group theme detection.
  cat_tfidf_top_n: 30           # Number of top TF-IDF terms to surface per group in category_tfidf.csv.
  review_group: null            # Optional: restrict the full analysis run to a single group value. null = run all eligible groups.
  exclude_groups: []            # List of group values to skip entirely. Applied before any analysis step.
  synthesis_max_workers: 8      # Maximum number of concurrent threads in the per-group synthesis ThreadPoolExecutor.
  labeling_max_workers: 8       # Maximum number of concurrent threads in the per-topic labeling ThreadPoolExecutor.

  bins: []
  # Time-slice bucketing applied to posted_date before grouping.
  # NOT SUPPORTED IN V1: topic identity and source_topic traceability are keyed
  # by (group, topic_id) only. Non-empty bins would cause silent topic-id
  # collisions across bins within the same group. NB03 raises a ValueError if
  # this is non-empty. Planned for a future version.
  # Example entry format (for reference only):
  #   - name: "H1 2025"
  #     start: "2025-01-01"
  #     end:   "2025-06-30"

  filter_logic: and
  # Controls how multiple filter rules in the filters list are combined.
  # Only "and" is supported by the current implementation; this value is
  # validated at startup and will raise an error if set to anything else.

  filters:
    - field: expiration_date
      op: range
      min: "2023-07-01"
  # Declarative filter rules applied to the enriched corpus before analysis.
  # Each rule requires: field (column name), op (eq | in | range | is_null | not_null).
  # op: eq    requires: value
  # op: in    requires: values (list)
  # op: range requires: min and/or max (date strings are auto-coerced for date columns)
  # To run without filters, replace the list above with: filters: []

  group_descriptions:
    project_category:              "product categories teachers use to request classroom supplies"
    grade_band:                    "grade bands (PreK-2, 3-5, 6-8, 9-12) across DonorsChoose projects"
    posted_year:                   "annual time periods showing how teacher language evolved"
    posted_year_quarter:           "quarterly time periods showing how teacher language evolved"
    metro_type_at_time_of_posting: "school metro types across DonorsChoose projects"
    school_is_low_income:          "low-income vs non-low-income schools"
    efs_x_grade_band:              "efs waterfall interacted with grade band"
    funding_status_x_metro:        "funded/expired interacted with metro type"

  verification:
    by_group_min_source_topics: 3  # Verify by-group insights only when they cite at least this many source topics. Cross-group insights are always verified regardless of topic count.

  slice_rules:
    min_group_projects: 35       # Minimum projects required for a group to be eligible for category TF-IDF and NMF.
    min_retained_vocab: 60       # Minimum retained TF-IDF vocabulary size required for an NMF slice to proceed.
    min_tfidf_nnz: 300           # Minimum non-zero TF-IDF entries required for an NMF slice to proceed.
    small_slice_cutoff: 125      # If median group size falls below this value, small-slice mode activates and uses small_slice_topic_cap instead of nmf.n_components.
    small_slice_topic_cap: 8     # Maximum NMF topic count when small-slice mode is active.
    min_projects_per_topic: 15   # Minimum projects per NMF topic. Used by choose_n_components() in utils.py as the divisor in max(4, n_docs // min_projects_per_topic).
    cross_min_insights: 8        # Minimum number of cross-group insights requested from the synthesis prompt.
    cross_max_insights: 16       # Maximum number of cross-group insights requested from the synthesis prompt.
    per_group_min_insights: 2    # Minimum number of per-group insights requested from the synthesis prompt.
    per_group_max_insights: 4    # Maximum number of per-group insights requested from the synthesis prompt.

  packaging:
    min_verified_topic_count: 1       # Minimum verified source-topic count for an insight to pass packaging thresholds.
    min_supporting_project_count: 20  # Minimum supporting-project count for an insight to pass packaging thresholds.
    min_mean_topic_share: 0.35        # Minimum mean topic_share across verified topics for an insight to pass packaging thresholds.
    main_min_verification_ratio: 0.75 # Minimum verified/claimed topic ratio for main-section eligibility. Consumed by assign_topline_sections_simple() in utils.py; NB03 should pass this value as the main_min_verification_ratio argument.
    main_cross_limit: 5               # Maximum number of cross-category insights placed in the main report section.

  dedupe:
    topic_overlap_high: 0.80   # Drop a candidate immediately when its verified-topic overlap with a kept insight is at or above this level.
    topic_overlap_min: 0.60    # Minimum topic overlap required before title/text similarity scores are also checked.
    title_overlap_min: 0.60    # Minimum title-token Jaccard overlap required for a deterministic duplicate drop when topic overlap is moderate.
    text_overlap_min: 0.55     # Minimum combined title+body token Jaccard overlap required for a deterministic duplicate drop when topic overlap is moderate.

llm:
  top_terms_in_prompt: 10          # Number of top NMF terms to include per topic in labeling and synthesis prompts.
  n_representative_snippets: 5     # Number of representative project snippets included in each topic-labeling prompt.
  synthesis_top_terms_count: 6     # Number of top terms included per topic line in synthesis prompts (typically smaller than top_terms_in_prompt).
  max_retries: 3                   # Maximum retry attempts for LLM API calls. NB03 setup should read this value and pass it explicitly to _label_with_retry(), _call_with_retry(), synthesize_one_group(), and verify_source_topics().

models:
  labeling: gpt-5.4-nano           # Model used for short topic / cluster labeling tasks (NB03 Step 5).
  verify: gpt-5.4-nano             # Model used to verify that cited source topics directly support each insight (NB03).
  gate: gpt-5.4-mini               # Model used for enrichment cluster coherence gating (NB02 Pass A).
  classify: gpt-5.4-mini           # Model used for framing taxonomy classification (NB02 Pass B).
  synthesis: gpt-5.4               # Model used for cross-group and per-group synthesis narrative generation (NB03).

output:
  csv_max_ids_per_insight: 500   # Maximum number of ranked project IDs to store per insight row in CSV outputs. NB03 should pass this value to build_verified_insight_tables() as top_project_id_limit. Separate from looker_id_limit, which governs URL length, not CSV storage.
  looker_base_url: "https://donorschoose.looker.com/explore/main/project"
  looker_filter_field: "project.projectid"
  looker_fields:
    - "project.projectid"
    - "project_essays.essay"
  looker_limit: 500              # Row limit passed to Looker Explore URLs.
  looker_id_limit: 200           # Maximum number of project IDs included in a Looker Explore URL filter. Separate from csv_max_ids_per_insight — Looker URLs have a practical length cap.
  report_title: "Classroom Compass: [Update before each run]"  # Title shown at the top of the DOCX report. Replace the bracketed text with the actual report title before running NB03.
  report_main_section_label: "Main Insights"          # H1 heading for the main report section.
  report_appendix_section_label: "Appendix"           # H1 heading for the appendix section.
  report_main_cross_label: "Cross-Category Similarities"       # H2 heading for main-section cross-category insights.
  report_main_by_group_label: "Group-Specific Findings"        # H2 heading for main-section by-group insights.
  report_appendix_cross_label: "Additional Cross-Category Insights"    # H2 heading for appendix cross-category insights.
  report_appendix_by_group_label: "Additional Group-Specific Findings" # H2 heading for appendix by-group insights.
  report_include_meta_line: true      # When true, renders an italic support/count line above each insight body in the DOCX.
  report_include_signal_summary: true # When true, renders a project-count and insight-count summary line below the report title.
  report_include_looker_link: true    # When true, appends a Looker Explore hyperlink to each insight block in the DOCX.
  report_looker_link_text: "Project essays for this insight"

quality:
