sql:
  min_doc_count: 15          # Minimum number of distinct projects a token must appear in to be retained after SQL-side filtering.
  max_doc_fraction: 0.50     # Maximum share of projects a token may appear in before being treated as too common and dropped.
  token_cap: 80              # Maximum number of tokens kept per project after SQL extraction / trimming.

preprocess:
  min_project_tokens: 5      # Minimum number of tokens a project must have after preprocessing to remain in the dataset.
  dedup_tokens_per_project: true  # Whether repeated occurrences of the same token inside a single project are collapsed to one unique token.

ingest:
  chunk_size: 500000         # Number of rows to process per chunk when ingesting large SQL extract CSVs.

ngrams:
  max_n: 3                   # Maximum n-gram length to generate upstream (for example: 3 = allow unigrams, bigrams, and trigrams).

tfidf:
  min_df: 8                    # Minimum document frequency threshold for terms retained in TF-IDF.
  max_df: 0.45                 # Maximum document-frequency share allowed before a term is considered too common.
  ngram_range: [1, 2]          # Range of n-grams used for TF-IDF feature construction.

nmf:
  n_components: 20             # Base number of NMF topics/components per group.
  top_words: 12                # Number of highest-weight terms surfaced per topic.
  random_seed: 42              # Random seed for reproducible NMF initialization.
  max_iter: 400                # Maximum number of iterations for NMF optimization.

enrichment:
  rare_doc_freq_ceiling: 1000        # Maximum document frequency for a token/phrase to count as "rare" during enrichment candidate discovery.
  agg_distance_threshold: 0.35       # Distance threshold used when clustering semantically similar enrichment candidates; lower values create tighter clusters.
  min_cluster_size: 3                # Minimum number of candidate terms/items required for an enrichment cluster to be kept.
  min_inject_projects: 25            # Minimum number of projects that must support an enrichment signal before it is injected back into the corpus.
  max_doc_freq_for_injection: 25000  # Maximum document frequency allowed for a candidate enrichment term before it is considered too common to inject.
  classify_batch_size: 150           # Number of items sent per batch during LLM or embedding-based enrichment classification.
  embedding_model: "all-MiniLM-L6-v2"  # Sentence-transformer model used to create embeddings for enrichment similarity / clustering work.
  cache_schema_version: "v1"           # Manual cache version string; change this to invalidate prior cached enrichment artifacts.
  coverage_deviation_warn_threshold: 10  # Warning threshold, in percentage points, when realized enrichment coverage deviates from the target / expected coverage.
  force_reclassify: true                # Whether to re-run enrichment classification even when cached framing / classification outputs already exist.

analysis:
  group_by: project_category        # Single column used to split the corpus into analysis groups; downstream code expects a scalar field name, not a list.
  min_group_projects: 50           # Minimum number of projects required for a group to be analyzed.
  min_coverage: 6                  # Minimum coverage threshold a topic / signal must meet within a group to be retained in analysis outputs.
  topic_assignment_threshold: 0.30 # Minimum topic_share required to link a project to a topic in the project-topic bridge.
  nmf_min_shared: 3                # Minimum shared evidence required when evaluating overlap / connection among NMF-derived topic terms or signals.
  cat_tfidf_top_n: 20              # Number of top TF-IDF terms to surface for each analysis group / category summary.
  review_group: null               # Optional single group value to restrict the run to; null means run all eligible groups.
  exclude_groups: []               # List of specific group values to skip entirely during analysis.
  synthesis_max_workers: 8         # Maximum number of parallel worker threads used for per-group synthesis tasks.
  labeling_max_workers: 8          # Maximum number of parallel worker threads used for per-topic labeling tasks.
  bins: []                         # Optional analyst-defined date bins; each item should be a dict like {name, start, end} for add_bin-style bucketing.
  filter_logic: and                # Filter-combination logic for analysis scoping; current implementation only allows 'and'.
  filters:
    - field: funded_date
      op: range
      min: "2025-07-01"
  #filters: []                      # Declarative list of analysis-scope filter rules applied after the enriched corpus is loaded.

  group_descriptions:
    project_category: "product categories teachers use to request classroom supplies"   # Prompt-friendly description used when group_by=project_category.
    grade_band: "grade bands (PreK-2, 3-5, 6-8, 9-12) across DonorsChoose projects"     # Prompt-friendly description used when group_by=grade_band.
    posted_year: "annual time periods showing how teacher language evolved"              # Prompt-friendly description used when group_by=posted_year.
    posted_year_quarter: "quarterly time periods showing how teacher language evolved"   # Prompt-friendly description used when group_by=posted_year_quarter.
    metro_type_at_time_of_posting: "school metro types across DonorsChoose projects"     # Prompt-friendly description used when group_by=metro_type_at_time_of_posting.
    school_is_low_income: "low-income vs non-low-income schools"                         # Prompt-friendly description used when group_by=school_is_low_income.

  verification:
    by_group_min_source_topics: 3  # Verify by-group insights only when they cite at least this many source topics.

  slice_rules:
    min_group_projects: 35  # Minimum projects required for a group to be eligible for category TF-IDF and NMF.
    min_retained_vocab: 60  # Minimum retained TF-IDF vocabulary required for an NMF slice to run.
    min_tfidf_nnz: 300  # Minimum non-zero TF-IDF entries required for an NMF slice to run.
    small_slice_cutoff: 125  # If median projects per group falls below this, use the smaller topic cap below.
    small_slice_topic_cap: 8  # Maximum NMF topics when small-slice mode is active.
    cross_min_insights: 8  # Default minimum number of cross-group insights requested from synthesis.
    cross_max_insights: 16  # Hard maximum number of cross-group insights requested from synthesis.
    per_group_min_insights: 2  # Default minimum number of per-group insights requested from synthesis.
    per_group_max_insights: 4  # Hard maximum number of per-group insights requested from synthesis.

  packaging:
    min_verified_topic_count: 1  # Minimum verified source-topic count required for an insight to be accepted into report packaging.
    min_supporting_project_count: 20  # Minimum supporting-project count required for an insight to be accepted into report packaging.
    min_mean_topic_share: 0.35  # Minimum mean topic_share across verified topics required for an insight to be accepted into report packaging.
    main_min_verification_ratio: 0.75  # Minimum verified/claimed topic ratio required for an insight to be eligible for the main section.
    main_cross_limit: 5  # Maximum number of cross-category insights allowed in the main report section.

  dedupe:
    topic_overlap_high: 0.80  # Drop immediately as a duplicate when verified-topic overlap is at or above this level.
    topic_overlap_min: 0.60  # Minimum topic overlap required before title/text similarity can trigger a duplicate drop.
    title_overlap_min: 0.60  # Minimum title-token overlap required for deterministic duplicate dropping when topic overlap is moderate.
    text_overlap_min: 0.55  # Minimum combined title+body token overlap required for deterministic duplicate dropping when topic overlap is moderate.

llm:
  top_terms_in_prompt: 10          # Number of top terms to include in each LLM prompt for labeling / synthesis context.
  n_representative_snippets: 5     # Number of representative text snippets / examples to include in LLM prompts.
  synthesis_top_terms_count: 6

models:
  labeling: gpt-5.4-nano           # Model used for short topic / cluster labeling tasks.
  dedup: gpt-5.4-nano              # Model used for deduplicating similar insights.
  verify: gpt-5.4-nano             # Model used for determining if topics match parent insight.
  gate: gpt-5.4-mini               # Model used for gating / validation decisions in the pipeline.
  classify: gpt-5.4-mini           # Model used for classification steps.
  synthesis: gpt-5.4               # Model used for longer-form synthesis and narrative generation.
  discovery: gpt-5.4               # Model used for broader discovery / ideation steps.

output:
  csv_max_ids_per_insight: 500  # Maximum number of project IDs to attach / store for a single insight row in CSV outputs.
  looker_base_url: "https://donorschoose.looker.com/explore/main/project"
  looker_filter_field: "project.projectid"
  looker_fields:
    - "project.projectid"
    - "project_essays.essay"
  looker_limit: 500
  looker_id_limit: 100
  report_title: "Trend Tracker: <lorem ipsum>"  # Business-ready title shown at the top of the DOCX. Update this before each run.
  report_main_section_label: "Main Insights"  # H1 heading for the main packaged section.
  report_appendix_section_label: "Appendix"  # H1 heading for the appendix packaged section.
  report_main_cross_label: "Cross-Category Similarities"  # H2 heading for main-section cross-category insights.
  report_main_by_group_label: "Group-Specific Findings"  # H2 heading for main-section by-group insights.
  report_appendix_cross_label: "Additional Cross-Category Insights"  # H2 heading for appendix cross-category insights.
  report_appendix_by_group_label: "Additional Group-Specific Findings"  # H2 heading for appendix by-group insights.
  report_include_meta_line: true  # Whether to render the italic support/count line above each insight body.
  report_include_signal_summary: true  # Whether to render the project count and insight count summary line below the title.
  report_include_looker_link: true
  report_looker_link_text: "Project essays for this insight"
